paths:
  - Configuration/

filePatterns:
  - "*.typoscript"

sniffs:
  - class: Helmich\TypoScriptLint\Linter\Sniff\IndentationSniff
    parameters:
      useSpaces: true
      indentPerLevel: 4
  - class: Helmich\TypoScriptLint\Linter\Sniff\DeadCodeSniff
  - class: Helmich\TypoScriptLint\Linter\Sniff\EmptySectionSniff
  - class: Helmich\TypoScriptLint\Linter\Sniff\NestingConsistencySniff
  - class: Helmich\TypoScriptLint\Linter\Sniff\RepeatingRValueSniff
